name: Generating rulesets

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  generate-lists:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout my repo
        uses: actions/checkout@v2
        with:
          path: my_repo

      # STEP 1: GENERATE .SRS FILES TO SINGBOX
      - name: Checkout generate-geoip-geosite repo
        uses: actions/checkout@v4
        with:
          repository: Dunamis4tw/generate-geoip-geosite
          path: generate-geoip-geosite

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: generate-geoip-geosite/go.mod

      - name: Create a folder for singbox lists
        run: |
          cd my_repo || exit 1
          mkdir -p singbox

      - name: Creating json data sources for generating .srs lists
        run: |
          cd generate-geoip-geosite || exit 1
          echo "Current Directory: $PWD"
          mkdir -p singbox-inputs
          
          cat << EOF > singbox-inputs/torrents.json
          [
            {
              "url": "https://raw.githubusercontent.com/sakib-m/Pi-hole-Torrent-Blocklist/main/all-torrent-trackers.txt",
              "contentType": "DefaultList",
              "category": "torrent_trackers"
            },
            {
              "url": "https://raw.githubusercontent.com/sakib-m/Pi-hole-Torrent-Blocklist/main/all-torrent-websites.txt",
              "contentType": "DefaultList",
              "category": "torrent_websites"
            }
          ]
          EOF
          
          cat << EOF > singbox-inputs/antifilter.json
          [
            {
              "url": "https://antifilter.download/list/allyouneed.lst",
              "contentType": "DefaultList",
              "category": "antifilter_allyouneed"
            },
            {
              "url": "https://community.antifilter.download/list/domains.lst",
              "contentType": "DefaultList",
              "category": "antifilter_community_domain"
            },
            {
              "url": "https://community.antifilter.download/list/community.lst",
              "contentType": "DefaultList",
              "category": "antifilter_community_ip"
            }
          ]
          EOF

      # Загрузка adaway списка с retry и разными методами
      - name: Prepare and Download adaway list for local processing
        run: |
          cd generate-geoip-geosite || exit 1
          mkdir -p adaway-local-input
          
          echo "Downloading from schakal.ru..."
          SUCCESS=false
          
          # Попытка 1-2: wget с User-Agent
          for i in {1..2}; do
            echo "Attempt $i (wget with User-Agent)..."
            if wget --timeout=60 --tries=2 \
                    --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                    -O adaway-local-input/include-domain-adaway.lst \
                    "https://schakal.ru/hosts/alive_hosts_mail_fb.txt" 2>&1; then
              if [ -f adaway-local-input/include-domain-adaway.lst ] && [ -s adaway-local-input/include-domain-adaway.lst ]; then
                echo "✅ Successfully downloaded with wget"
                SUCCESS=true
                break
              fi
            fi
            echo "Attempt $i failed"
            sleep 5
          done
          
          # Попытка 3-4: curl с User-Agent
          if [ "$SUCCESS" = false ]; then
            for i in {3..4}; do
              echo "Attempt $i (curl with User-Agent)..."
              if curl -L --max-time 60 \
                      -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                      -o adaway-local-input/include-domain-adaway.lst \
                      "https://schakal.ru/hosts/alive_hosts_mail_fb.txt" 2>&1; then
                if [ -f adaway-local-input/include-domain-adaway.lst ] && [ -s adaway-local-input/include-domain-adaway.lst ]; then
                  echo "✅ Successfully downloaded with curl"
                  SUCCESS=true
                  break
                fi
              fi
              echo "Attempt $i failed"
              sleep 5
            done
          fi
          
          # Попытка 5: curl с HTTP/1.1
          if [ "$SUCCESS" = false ]; then
            echo "Attempt 5 (curl with HTTP/1.1)..."
            if curl -L --http1.1 --max-time 60 \
                    -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                    -o adaway-local-input/include-domain-adaway.lst \
                    "https://schakal.ru/hosts/alive_hosts_mail_fb.txt" 2>&1; then
              if [ -f adaway-local-input/include-domain-adaway.lst ] && [ -s adaway-local-input/include-domain-adaway.lst ]; then
                echo "✅ Successfully downloaded with curl HTTP/1.1"
                SUCCESS=true
              fi
            fi
          fi
          
          # Проверка результата
          if [ "$SUCCESS" = false ] || [ ! -f adaway-local-input/include-domain-adaway.lst ] || [ ! -s adaway-local-input/include-domain-adaway.lst ]; then
            echo ""
            echo "❌ ERROR: Failed to download adaway list after all attempts"
            echo "This GitHub runner may have network restrictions to schakal.ru"
            echo ""
            echo "Solutions:"
            echo "1. Re-run the workflow (may get a different runner)"
            echo "2. Use cached list (see ADAWAY_CACHE_INSTRUCTIONS.md)"
            exit 1
          fi
          
          echo ""
          echo "✅ Adaway list downloaded successfully"
          echo "File size: $(wc -l < adaway-local-input/include-domain-adaway.lst) lines"

      - name: Output the contents of the singbox-inputs folder
        run: |
          echo "A list of created data sources for generating .srs lists:"
          ls -R ${{ github.workspace }}/generate-geoip-geosite/singbox-inputs
          echo "------------------------------"

      - name: Generating .srs lists for singbox
        run: |
          cd ${{ github.workspace }}/generate-geoip-geosite
          go build .
          
          # Генерация для Adaway в режиме локальных файлов
          ./generate-geoip-geosite -i ./adaway-local-input -o ../my_repo/singbox/adaway --gen-rule-set-srs
          
          # Генерация для остальных списков
          ./generate-geoip-geosite -s singbox-inputs/torrents.json -i ../my_repo/singbox/torrents -o ../my_repo/singbox/torrents --gen-rule-set-srs
          ./generate-geoip-geosite -s singbox-inputs/antifilter.json -i ../my_repo/singbox/antifilter -o ../my_repo/singbox/antifilter --gen-rule-set-srs

      - name: Output the list of generated .srs files
        run: |
          echo "adaway:"
          ls -la ${{ github.workspace }}/my_repo/singbox/adaway
          echo "------------------------------"
          echo "torrents:"
          ls -la ${{ github.workspace }}/my_repo/singbox/torrents
          echo "------------------------------"  
          echo "antifilter:"
          ls -la ${{ github.workspace }}/my_repo/singbox/antifilter
          echo "------------------------------"

      - name: Set a variable with date and time
        id: date
        run: |
          echo "DATE=$(TZ=Europe/Moscow date +'%d.%m.%Y %H:%M')" >> $GITHUB_ENV

      - name: Committing and pushing changes to SINGBOX folder to github
        uses: EndBug/add-and-commit@v9
        with:
          author_name: "GitHub Action"
          author_email: "action@github.com"
          message: "Updated ${{ env.DATE }}"
          add: "singbox"
          cwd: "./my_repo"

      # STEP 2: GENERATE GEOSITES .DAT FILES TO XRAY
      - name: Checkout v2ray-geosite repository
        uses: actions/checkout@v4
        with:
          repository: v2fly/domain-list-community
          path: v2ray-geosite

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: v2ray-geosite/go.mod

      - name: Build geosite .dat files
        run: |
          cd v2ray-geosite || exit 1
          echo "Current Directory: $PWD"
          mkdir -p input
          mkdir -p input/adaway
          mkdir -p input/torrents
          mkdir -p input/antifilter_community
          
          # Load adaway list and generate .dat file (копируем БЕЗ расширения .lst)
          cp ../my_repo/singbox/adaway/include-domain-adaway.lst input/adaway/adaway
          go run main.go --datapath=./input/adaway --outputdir=../my_repo/xray/adaway --exportlists=adaway --outputname=adaway.dat
          
          # Loading torrents lists and generating .dat file (копируем БЕЗ расширения .lst)
          cp ../my_repo/singbox/torrents/include-domain-torrent_trackers.lst input/torrents/torrent_trackers
          cp ../my_repo/singbox/torrents/include-domain-torrent_websites.lst input/torrents/torrent_websites
          go run main.go --datapath=./input/torrents --outputdir=../my_repo/xray/torrents --exportlists=torrent_trackers,torrent_websites --outputname=torrents.dat
          
          # Loading antifilter community list and generating .dat file (копируем БЕЗ расширения .lst)
          cp ../my_repo/singbox/antifilter/include-domain-antifilter_community_domain.lst input/antifilter_community/antifilter_community_domain
          go run main.go --datapath=./input/antifilter_community --outputdir=../my_repo/xray/antifilter --exportlists=antifilter_community_domain --outputname=antifilter_community_domain.dat
          
          # Переходим в корневую папку и удаляем папку v2ray-geosite
          cd ../ && rm -rf v2ray-geosite

      - name: Output the list of generated geosite .dat files
        run: |
          echo "adaway:"
          ls ${{ github.workspace }}/my_repo/xray/adaway
          echo "------------------------------"
          echo "torrents:"
          ls ${{ github.workspace }}/my_repo/xray/torrents
          echo "------------------------------"
          echo "antifilter:"
          ls ${{ github.workspace }}/my_repo/xray/antifilter
          echo "------------------------------"

      - name: Committing and pushing changes to XRAY folder to github (geosite files)
        uses: EndBug/add-and-commit@v9
        with:
          author_name: "GitHub Action"
          author_email: "action@github.com"
          message: "Updated ${{ env.DATE }}"
          add: "xray"
          cwd: "./my_repo"

      # STEP 3: GENERATE GEOIP .DAT FILES TO XRAY
      - name: Checkout v2ray-geoip repository
        uses: actions/checkout@v4
        with:
          repository: v2fly/geoip
          path: v2ray-geoip 

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: v2ray-geoip/go.mod

      - name: Creating a configuration json file for geoip
        run: |
          cd v2ray-geoip || exit 1
          echo "Current Directory: $PWD"
          
          cat << EOF > config.json
          {
            "input": [
              {
                "type": "text",
                "action": "add",
                "args": {
                  "name": "antifilter_allyouneed_ip",
                  "uri": "https://antifilter.download/list/allyouneed.lst"
                }
              },
              {
                "type": "text",
                "action": "add",
                "args": {
                  "name": "antifilter_community_ip",
                  "uri": "https://community.antifilter.download/list/community.lst"
                }
              }
            ],
            "output": [
              {
                "type": "v2rayGeoIPDat",
                "action": "output",
                "args": {
                  "outputName": "antifilter_allyouneed_ip.dat",
                  "wantedList": ["antifilter_allyouneed_ip"],
                  "outputDir": "../my_repo/xray/antifilter"
                }
              },
              {
                "type": "v2rayGeoIPDat",
                "action": "output",
                "args": {
                  "outputName": "antifilter_community_ip.dat",
                  "wantedList": ["antifilter_community_ip"],
                  "outputDir": "../my_repo/xray/antifilter"
                }
              },
              {
                "type": "text",
                "action": "output",
                "args": {
                  "wantedList": ["antifilter_allyouneed_ip", "antifilter_community_ip"],
                  "outputDir": "../my_repo/xray/antifilter"
                }
              }
            ]
          }
          EOF

      - name: Build geoip .dat files
        run: |
          cd v2ray-geoip || exit 1
          go run ./

      - name: Output the list of generated geosite .dat lists
        run: |
          echo "adaway:"
          ls ${{ github.workspace }}/my_repo/xray/adaway
          echo "------------------------------"
          echo "torrents:"
          ls ${{ github.workspace }}/my_repo/xray/torrents
          echo "------------------------------"
          echo "antifilter:"
          ls ${{ github.workspace }}/my_repo/xray/antifilter
          echo "------------------------------"

      - name: Committing and pushing changes to XRAY folder to github (geoip files)
        uses: EndBug/add-and-commit@v9
        with:
          author_name: "GitHub Action"
          author_email: "action@github.com"
          message: "Updated ${{ env.DATE }}"
          add: "xray"
          cwd: "./my_repo"

      - name: Send a notification to Telegram when an error is detected
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ERROR on "rule set generation"
            Repository: ${{ github.repository }}
