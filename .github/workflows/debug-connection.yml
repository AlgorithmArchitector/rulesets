name: Debug Geosite Generation

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  debug-generation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout my repo
        uses: actions/checkout@v2
        with:
          path: my_repo

      - name: Checkout generate-geoip-geosite repo
        uses: actions/checkout@v4
        with:
          repository: Dunamis4tw/generate-geoip-geosite
          path: generate-geoip-geosite

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: generate-geoip-geosite/go.mod

      - name: Create folders
        run: |
          cd my_repo || exit 1
          mkdir -p singbox/torrents

      - name: Create test data source
        run: |
          cd generate-geoip-geosite || exit 1
          mkdir -p singbox-inputs
          
          cat << EOF > singbox-inputs/torrents.json
          [
            {
              "url": "https://raw.githubusercontent.com/sakib-m/Pi-hole-Torrent-Blocklist/main/all-torrent-trackers.txt",
              "contentType": "DefaultList",
              "category": "torrent_trackers"
            }
          ]
          EOF

      - name: Generate .srs files
        run: |
          cd generate-geoip-geosite || exit 1
          go build .
          ./generate-geoip-geosite -s singbox-inputs/torrents.json -i ../my_repo/singbox/torrents -o ../my_repo/singbox/torrents --gen-rule-set-srs

      - name: DEBUG 1 - Show generated files in singbox/torrents
        run: |
          echo "================================================="
          echo "ФАЙЛЫ ПОСЛЕ ГЕНЕРАЦИИ .SRS"
          echo "================================================="
          ls -la ${{ github.workspace }}/my_repo/singbox/torrents
          echo ""
          echo "Содержимое первых 5 строк каждого файла:"
          echo ""
          for file in ${{ github.workspace }}/my_repo/singbox/torrents/*; do
            if [ -f "$file" ]; then
              echo "--- Файл: $(basename $file) ---"
              head -n 5 "$file" || echo "Бинарный файл"
              echo ""
            fi
          done

      - name: Checkout v2ray-geosite repository
        uses: actions/checkout@v4
        with:
          repository: v2fly/domain-list-community
          path: v2ray-geosite

      - name: Setup Go for v2ray-geosite
        uses: actions/setup-go@v5
        with:
          go-version-file: v2ray-geosite/go.mod

      - name: Prepare input folder for v2ray-geosite
        run: |
          cd v2ray-geosite || exit 1
          mkdir -p input/torrents

      - name: DEBUG 2 - Test different file naming strategies
        run: |
          cd v2ray-geosite || exit 1
          echo "================================================="
          echo "ТЕСТ 1: Копируем с расширением .lst"
          echo "================================================="
          cp ../my_repo/singbox/torrents/include-domain-torrent_trackers.lst input/torrents/torrent_trackers.lst
          ls -la input/torrents/
          echo ""
          echo "Пробуем запустить v2ray-geosite..."
          go run main.go --datapath=./input/torrents --outputdir=../my_repo/xray/test1 --exportlists=torrent_trackers.lst --outputname=test1.dat 2>&1 || echo "ОШИБКА в тесте 1"
          echo ""
          
          echo "================================================="
          echo "ТЕСТ 2: Копируем БЕЗ расширения"
          echo "================================================="
          rm -rf input/torrents/*
          cp ../my_repo/singbox/torrents/include-domain-torrent_trackers.lst input/torrents/torrent_trackers
          ls -la input/torrents/
          echo ""
          echo "Пробуем запустить v2ray-geosite..."
          go run main.go --datapath=./input/torrents --outputdir=../my_repo/xray/test2 --exportlists=torrent_trackers --outputname=test2.dat 2>&1 || echo "ОШИБКА в тесте 2"
          echo ""
          
          echo "================================================="
          echo "ТЕСТ 3: Копируем в нижнем регистре БЕЗ расширения"
          echo "================================================="
          rm -rf input/torrents/*
          cp ../my_repo/singbox/torrents/include-domain-torrent_trackers.lst input/torrents/torrenttrackers
          ls -la input/torrents/
          echo ""
          echo "Пробуем запустить v2ray-geosite..."
          go run main.go --datapath=./input/torrents --outputdir=../my_repo/xray/test3 --exportlists=torrenttrackers --outputname=test3.dat 2>&1 || echo "ОШИБКА в тесте 3"
          echo ""
          
          echo "================================================="
          echo "ТЕСТ 4: Проверяем формат файла"
          echo "================================================="
          echo "Первые 10 строк исходного файла:"
          head -n 10 ../my_repo/singbox/torrents/include-domain-torrent_trackers.lst
          echo ""
          echo "Проверяем кодировку:"
          file ../my_repo/singbox/torrents/include-domain-torrent_trackers.lst
          echo ""

      - name: DEBUG 3 - Check v2ray-geosite version and requirements
        run: |
          cd v2ray-geosite || exit 1
          echo "================================================="
          echo "ВЕРСИЯ v2ray-geosite"
          echo "================================================="
          git log -1 --oneline
          echo ""
          echo "================================================="
          echo "СОДЕРЖИМОЕ go.mod"
          echo "================================================="
          cat go.mod
          echo ""
          echo "================================================="
          echo "СПРАВКА ПО ПАРАМЕТРАМ"
          echo "================================================="
          go run main.go --help || echo "Справка недоступна"

      - name: DEBUG 4 - Show results
        run: |
          echo "================================================="
          echo "РЕЗУЛЬТАТЫ ТЕСТОВ"
          echo "================================================="
          echo "Тест 1 (с .lst):"
          ls -la ${{ github.workspace }}/my_repo/xray/test1 2>/dev/null || echo "Папка не создана - тест провалился"
          echo ""
          echo "Тест 2 (без расширения):"
          ls -la ${{ github.workspace }}/my_repo/xray/test2 2>/dev/null || echo "Папка не создана - тест провалился"
          echo ""
          echo "Тест 3 (нижний регистр без расширения):"
          ls -la ${{ github.workspace }}/my_repo/xray/test3 2>/dev/null || echo "Папка не создана - тест провалился"
          echo ""
          echo "================================================="
          echo "ИТОГ: Какой тест сработал?"
          echo "================================================="
